<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Anniversary Letter</title>
    <style>
        :root {
            --pink: #FFC0CB;
            --dark-pink: #ff99aa;
            --baby-blue: #B0E0E6;
            --paper: #ffffff;
        }

        body {
            background-color: var(--baby-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Tahoma', sans-serif;
        }

        .envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
        }

        /* ตัวซองจดหมาย */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--dark-pink);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 1;
        }

        /* ฝาพับจดหมาย */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 3;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--pink);
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        /* ส่วนหน้าของซอง */
        .envelope::after {
            content: "";
            position: absolute;
            bottom: 0;
            z-index: 2;
            border-left: 150px solid var(--pink);
            border-right: 150px solid var(--pink);
            border-top: 100px solid transparent;
            border-bottom: 100px solid var(--pink);
        }

        /* กระดาษข้างใน */
        .letter {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 80%;
            background: var(--paper);
            padding: 15px;
            box-sizing: border-box;
            transition: 0.5s;
            z-index: 1;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .letter h2 { font-size: 18px; color: #d63384; margin-bottom: 10px; }
        .letter p { font-size: 14px; color: #555; }

        /* อนิเมชั่นตอนกดเปิด */
        .envelope-container.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-container.open .letter {
            transform: translateY(-150px);
            height: 250px;
            z-index: 4;
        }

        /* ข้อความบอกให้กด */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="envelope-container" onclick="this.classList.toggle('open')">
        <div class="envelope"></div>
        <div class="letter">
            <h2>Happy 1 Year! ❤️</h2>
            <p>ถึง... คนเก่งของเค้า</p>
            <p>วันนี้เมื่อปีที่แล้วเราเริ่มเดินทางด้วยกัน ขอบคุณที่น่ารักเสมอมานะ รักที่สุดเลย!</p>
            <p style="font-size: 12px; margin-top: 20px;">[ใส่รูปคู่ตรงนี้ได้นะ]</p>
        </div>
        <div class="hint">คลิกที่ซองจดหมายดูสิ ✨</div>
    </div>

</body>
</html>
